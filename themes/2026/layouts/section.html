{{ define "main" }}
{{ if and (eq .Section "posts") (eq site.Params.enablePosts false) }}
  <h1>{{ .Title }}</h1>
  <p>This section is currently disabled in site configuration.</p>
{{ else }}
  <h1>{{ .Title }}</h1>
  {{ .Content }}
  {{ range .Pages }}
    <section>
      <h2><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></h2>
      {{ .Summary }}
    </section>
  {{ end }}
{{ end }}
{{ end }}
